<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>过审数据转换工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        html { min-width: 1400px; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1e3a 50%, #2a2e4a 100%);
            color: #fff;
            min-height: 100vh;
            min-width: 1400px;
            overflow-x: auto;
        }
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 10, 30, 0.55);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 10;
            width: 1400px !important;
            min-width: 1400px !important;
            max-width: 1400px !important;
            margin: 0 auto;
            padding: 40px 40px;
        }

        /* 模块分类导航 */
        .module-nav {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 35px;
            animation: fadeInDown .6s ease-out both;
        }
        .module-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 1.15em;
            font-weight: 600;
            cursor: pointer;
            transition: all .35s cubic-bezier(.16,1,.3,1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            user-select: none;
        }
        .module-btn .icon { font-size: 1.2em; line-height: 1; }
        .module-btn.approve {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 10px 40px rgba(102,126,234,.4);
        }
        .module-btn.approve:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 12px 45px rgba(102,126,234,.5);
        }
        .module-btn.reject {
            background: rgba(255,255,255,.05);
            border-color: rgba(239,68,68,.4);
            color: rgba(255,255,255,.85);
        }
        .module-btn.reject:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(239,68,68,.12);
            border-color: rgba(239,68,68,.7);
            box-shadow: 0 8px 30px rgba(239,68,68,.2);
        }
        .module-btn.music {
            background: rgba(255,255,255,.05);
            border-color: rgba(168,85,247,.4);
            color: rgba(255,255,255,.85);
        }
        .module-btn.music:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(168,85,247,.12);
            border-color: rgba(168,85,247,.7);
            box-shadow: 0 8px 30px rgba(168,85,247,.2);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 上传区域 */
        .upload-section {
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(102,126,234,.35);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            overflow: hidden;
            transition: all .3s ease;
            animation: fadeInUp .8s ease-out .2s both;
            cursor: pointer;
        }
        .upload-section.drag-over {
            border-color: rgba(102,126,234,.9) !important;
            border-style: solid !important;
            background: rgba(102,126,234,.12) !important;
            box-shadow: 0 0 80px rgba(102,126,234,.25), inset 0 0 40px rgba(102,126,234,.08);
            transform: scale(1.02) !important;
        }
        .upload-section h2 { font-size: 1.4em; margin-bottom: 8px; font-weight: 600; }
        .upload-section p { color: rgba(255,255,255,.6); font-size: .95em; }
        .drag-hint svg { transition: transform .3s ease; margin: 15px auto; display: block; }
        .upload-section.drag-over .drag-hint svg {
            transform: translateY(-8px) scale(1.1);
            stroke: rgba(102,126,234,.9);
        }
        .file-input-wrapper { display: inline-block; margin-top: 16px; position: relative; }
        .file-input { position: absolute; width: 0; height: 0; opacity: 0; }
        .file-label {
            display: inline-block;
            padding: 14px 40px;
            border: 2px dashed rgba(102,126,234,.4);
            border-radius: 14px;
            background: rgba(102,126,234,.08);
            color: rgba(255,255,255,.85);
            font-size: 1em;
            cursor: pointer;
            transition: all .3s ease;
        }
        .file-label:hover {
            border-color: rgba(102,126,234,.8);
            background: rgba(102,126,234,.15);
            box-shadow: 0 4px 20px rgba(102,126,234,.2);
        }

        /* 预览区域 */
        .preview-section {
            display: none;
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102,126,234,.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            animation: fadeInUp .6s ease-out both;
        }
        .preview-section.active { display: block; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card {
            flex: 1;
            background: rgba(102,126,234,.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .stat-label { font-size: .9em; color: rgba(255,255,255,.6); margin-top: 5px; }
        .stat-error { background: rgba(239,68,68,.12) !important; border: 1px solid rgba(239,68,68,.35) !important; }
        .stat-error .stat-number { background: linear-gradient(90deg, #f87171, #ef4444) !important; -webkit-background-clip: text !important; background-clip: text !important; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid rgba(102,126,234,.2);

        }
        table { width: 100%; border-collapse: collapse; font-size: 10pt; }
        th {
            background: rgba(102,126,234,.12);
            padding: 12px 14px;
            text-align: center;
            font-weight: 600;
            color: rgba(255,255,255,.9);
            border-bottom: 1px solid rgba(102,126,234,.3);
            white-space: nowrap;

        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            color: rgba(255,255,255,.75);
            text-align: center;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;

        tr:hover td { background: rgba(255,255,255,.03); }

        /* 按钮 */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 20px rgba(102,126,234,.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(102,126,234,.6); }
        .btn-secondary {
            background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.8);
            border: 1px solid rgba(255,255,255,.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.15); transform: translateY(-2px); }

        /* 分页 */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .pagination-info { color: rgba(255,255,255,.6); font-size: .9em; }
        .page-btn {
            padding: 8px 18px;
            border: 1px solid rgba(102,126,234,.4);
            border-radius: 8px;
            background: rgba(102,126,234,.08);
            color: rgba(255,255,255,.85);
            font-size: .9em;
            cursor: pointer;
            transition: all .2s ease;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(102,126,234,.25);
            border-color: rgba(102,126,234,.7);
        }
        .page-btn:disabled { opacity: .35; cursor: not-allowed; }

        /* 加载动画 */
        .loader {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5,10,30,.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loader.active { display: flex; }
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(102,126,234,.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 25px;
            font-size: 1.2em;
            color: rgba(255,255,255,.8);
            letter-spacing: 1px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 通知 */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 16px 30px;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            z-index: 10000;
            transform: translateX(120%);
            transition: transform .4s cubic-bezier(.16,1,.3,1);
            backdrop-filter: blur(20px);
        }
        .notification.show { transform: translateX(0); }
        .notification.success {
            background: rgba(16,185,129,.2);
            border: 1px solid rgba(16,185,129,.5);
            color: #6ee7b7;
        }
        .notification.error {
            background: rgba(239,68,68,.2);
            border: 1px solid rgba(239,68,68,.5);
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 模块分类导航 -->
        <div class="module-nav">
            <a href="converter-approve.html" class="module-btn approve">
                <span class="icon">✅</span>
                <span>过审</span>
            </a>
            <a href="converter-reject.html" class="module-btn reject">
                <span class="icon">✖</span>
                <span>不过审</span>
            </a>
            <a href="converter-music.html" class="module-btn music">
                <span class="icon">🎵</span>
                <span>音乐</span>
            </a>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section" id="uploadSection">
            <h2>✅ 过审数据转换工具</h2>
            <p>📂 拖拽 CSV/Excel 文件到此处上传</p>
            <div class="drag-hint">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(102,126,234,.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:15px auto;display:block;">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17,8 12,3 7,8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" class="file-input" accept=".csv,.xlsx,.xls">
                <label for="fileInput" class="file-label">📁 选择文件（CSV / Excel）</label>
            </div>
            <p style="margin-top:14px;font-size:.85em;color:rgba(255,255,255,.45)">支持 .csv / .xlsx / .xls 格式</p>
        </div>

        <!-- 预览区域 -->
        <div class="preview-section" id="previewSection">
            <div class="stats-row" id="stats"></div>
            <div class="table-wrapper">
                <table>
                    <thead id="previewHead"></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
            <div class="pagination-wrapper" id="paginationWrapper" style="display:none;">
                <button class="page-btn" id="pagePrevBtn" onclick="changePage(-1)">◀ 上一页</button>
                <span class="pagination-info" id="paginationInfo"></span>
                <button class="page-btn" id="pageNextBtn" onclick="changePage(1)">下一页 ▶</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="startConvert()">⚡ 开始转换</button>
                <button class="btn btn-secondary" onclick="resetAll()">🔄 重新上传</button>
            </div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">处理中...</div>
    </div>

    <div class="notification" id="notification"></div>

<script>
    const PAGE_SIZE = 20;
    let parsedData = [];
    let currentPage = 1;

    // ══════════════════════════════════════
    // 拖拽上传
    // ══════════════════════════════════════
    const uploadSection = document.getElementById('uploadSection');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadSection.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    uploadSection.addEventListener('dragenter', e => {
        uploadSection.classList.add('drag-over');
    });

    uploadSection.addEventListener('dragover', e => {
        e.dataTransfer.dropEffect = 'copy';
        uploadSection.classList.add('drag-over');
    });

    uploadSection.addEventListener('dragleave', e => {
        if (!uploadSection.contains(e.relatedTarget)) {
            uploadSection.classList.remove('drag-over');
        }
    });

    uploadSection.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        uploadSection.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            handleFile(this.files[0]);
        }
    });

    // ══════════════════════════════════════
    // 文件处理入口
    // ══════════════════════════════════════
    function handleFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['csv', 'xlsx', 'xls'].includes(ext)) {
            showNotification('请上传 CSV 或 Excel 文件', 'error');
            return;
        }

        const loader = document.getElementById('loader');
        loader.classList.add('active');
        document.getElementById('loaderText').textContent = '正在读取 ' + file.name + '...';

        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                if (ext === 'csv') {
                    parsedData = parseCSV(ev.target.result);
                } else {
                    const wb = XLSX.read(ev.target.result, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws);
                    parsedData = json.map(extractFields).filter(r => r && r.TimeStamp);
                }

                loader.classList.remove('active');

                if (parsedData.length === 0) {
                    showNotification('⚠️ 未找到有效数据，请检查文件格式', 'error');
                    return;
                }

                displayPreview();
                document.getElementById('previewSection').classList.add('active');
                showNotification('✅ 成功解析 ' + parsedData.length + ' 条数据');
            } catch(err) {
                loader.classList.remove('active');
                showNotification('文件解析失败：' + err.message, 'error');
                console.error(err);
            }
        };

        ext === 'csv' ? reader.readAsText(file, 'UTF-8') : reader.readAsArrayBuffer(file);
    }

    // ══════════════════════════════════════
    // CSV 解析器（逐字符状态机，正确处理引号内换行）
    // ══════════════════════════════════════
    function parseCSV(text) {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;
        let i = 0;

        while (i <= text.length) {
            if (i === text.length) {
                if (currentField || currentRow.length > 0) {
                    currentRow.push(currentField);
                    if (currentRow.some(f => f && f.trim())) rows.push(currentRow);
                }
                break;
            }

            const ch = text[i];

            if (inQuotes) {
                if (ch === '"') {
                    if (i + 1 < text.length && text[i + 1] === '"') {
                        currentField += '"';
                        i += 2;
                        continue;
                    } else {
                        inQuotes = false;
                        i++;
                        continue;
                    }
                } else {
                    currentField += ch;
                    i++;
                    continue;
                }
            } else {
                if (ch === '"') {
                    inQuotes = true;
                    i++;
                    continue;
                } else if (ch === ',') {
                    currentRow.push(currentField);
                    currentField = '';
                    i++;
                    continue;
                } else if (ch === '\n') {
                    currentRow.push(currentField);
                    currentField = '';
                    if (currentRow.some(f => f && f.trim())) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    i++;
                    continue;
                } else {
                    currentField += ch;
                    i++;
                    continue;
                }
            }
        }

        if (rows.length < 2) return [];

        const headers = rows[0].map(h => {
            let s = h || '';
            if (s.startsWith('"') && s.endsWith('"')) s = s.slice(1, -1);
            return s.trim();
        });

        console.log('=== CSV 列名 ===');
        headers.forEach(h => console.log('  -', h));
        console.log('=== 总行数:', rows.length - 1, '===');

        const result = [];
        for (let i = 1; i < rows.length; i++) {
            const vals = rows[i];
            const obj = {};
            headers.forEach((h, j) => {
                obj[h] = (vals[j] || '').replace(/\t/g, ' ').trim();
            });
            const extracted = extractFields(obj);

            if (result.length < 5 || !extracted.feed_id) {
                console.log('[行' + i + '] TS=[' + extracted.TimeStamp + '], feed_id=[' + extracted.feed_id + '], task=[' + extracted.dispute_task_id + ']');
            }

            if (extracted && extracted.TimeStamp) {
                result.push(extracted);
            }
        }

        console.log('=== 解析完成，有效数据:', result.length, '条，含 feed_id:', result.filter(r => r.feed_id).length, '条 ===');
        return result;
    }

    // ══════════════════════════════════════
    // 字符串搜索提取（不依赖 JSON.parse）
    // 类似 Excel 公式：FIND("feed_id", 字符串) → 定位 → MID 提取值
    // ══════════════════════════════════════
    function extractFromStr(str, key) {
        if (!str) return null;

        function doExtract(s, q) {
            const kw = q + key + q;
            let idx = s.indexOf(kw);
            if (idx === -1) return null;
            let rest = s.slice(idx + kw.length);
            let colonIdx = rest.search(/[:;]/);
            if (colonIdx === -1) return null;
            rest = rest.slice(colonIdx + 1).trimStart();
            if (!rest) return null;

            // 情况1：引号包裹 "value"
            if (rest[0] === '"') {
                let endIdx = rest.indexOf('"', 1);
                return endIdx === -1 ? null : rest.slice(1, endIdx);
            }
            // 情况2：转义引号 \"value\"
            if (rest[0] === '\\' && rest[1] === '"') {
                let endIdx = rest.indexOf('\\"', 2);
                return endIdx === -1 ? null : rest.slice(2, endIdx);
            }
            // 情况3：纯值
            let endIdx = rest.length;
            for (let j = 0; j < rest.length; j++) {
                if (rest[j] === ';' || rest[j] === ',' || rest[j] === '}' || rest[j] === '\n' || rest[j] === '\r' || rest[j] === ' ') {
                    endIdx = j; break;
                }
            }
            const val = rest.slice(0, endIdx).trim();
            return val || null;
        }

        return doExtract(str, '"') || doExtract(str, '\\"');
    }

    function extractFields(rawRow) {
        const result = {
            TimeStamp: '',
            dispute_task_id: '',
            feed_id: '',
            evidence_text: '',
            pruned_desc: '',   // 新增：审核说明文本
        };

        // 1. TimeStamp（直接取 + 格式化）
        result.TimeStamp = formatTimeStamp((rawRow['TimeStamp'] || '').trim());

        // 2. 从 content_data 字符串中搜索（主路径）
        const cd = (rawRow['content_data'] || '').trim();
        if (cd) {
            const tid = extractFromStr(cd, 'dispute_task_id');
            const fid = extractFromStr(cd, 'feed_id');
            const et  = extractFromStr(cd, 'evidence_text');
            if (tid) result.dispute_task_id = tid;
            if (fid) result.feed_id = fid;
            if (et)  result.evidence_text = et;
        }

        // 3. 从 answer_data 提取 pruned_desc（审核说明文本）
        const ad = (rawRow['answer_data'] || '').trim();
        if (ad) {
            const pd = extractFromStr(ad, 'pruned_desc');
            if (pd) result.pruned_desc = pd;
        }

        return result;
    }

    // ══════════════════════════════════════
    // 时间格式化（YYYY/M/D）
    // ══════════════════════════════════════
    function formatTimeStamp(timeStamp) {
        if (!timeStamp) return '';

        if (!isNaN(timeStamp) && timeStamp.indexOf('/') === -1 && timeStamp.indexOf('-') === -1) {
            const excelDate = parseFloat(timeStamp);
            if (!isNaN(excelDate)) {
                const date = new Date((excelDate - 25569) * 86400 * 1000);
                return date.getFullYear() + '/' + (date.getMonth() + 1) + '/' + date.getDate();
            }
        }

        timeStamp = timeStamp.replace(/\t/g, ' ').trim();
        const dateMatch = timeStamp.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        if (dateMatch) {
            return dateMatch[1] + '/' + parseInt(dateMatch[2]) + '/' + parseInt(dateMatch[3]);
        }

        return timeStamp;
    }

    // ══════════════════════════════════════
    // 数据预览（7列）
    // ══════════════════════════════════════
    const OUTPUT_COLS = ['TimeStamp', 'dispute_task_id', 'feed_id', '', '', '', 'evidence_text', 'pruned_desc'];
    const OUTPUT_COLS_ZH = ['TimeStamp', 'dispute_task_id', 'feed_id', '空', '空', '空', 'evidence_text', 'pruned_desc'];

    function displayPreview() {
        currentPage = 1;

        const statsEl = document.getElementById('stats');
        statsEl.innerHTML =
            '<div class="stat-card"><div class="stat-number">' + parsedData.length + '</div><div class="stat-label">总数据量</div></div>' +
            '<div class="stat-card"><div class="stat-number">' + parsedData.filter(r => r.dispute_task_id).length + '</div><div class="stat-label">争议任务数</div></div>' +
            '<div class="stat-card stat-error"><div class="stat-number">' + parsedData.filter(function(r){ return !r.feed_id || !r.dispute_task_id || !r.evidence_text; }).length + '</div><div class="stat-label">转化错误</div></div>' +
            '<div class="stat-card"><div class="stat-number">' + parsedData.filter(r => r.pruned_desc).length + '</div><div class="stat-label">含审核说明</div></div>';

        const headEl = document.getElementById('previewHead');
        headEl.innerHTML = '<tr>' + OUTPUT_COLS_ZH.map(c => '<th>' + c + '</th>').join('') + '</tr>';

        const pagWrapper = document.getElementById('paginationWrapper');
        pagWrapper.style.display = parsedData.length > PAGE_SIZE ? '' : 'none';

        renderPreviewPage();
    }

    function renderPreviewPage() {
        const bodyEl = document.getElementById('previewBody');
        const start = (currentPage - 1) * PAGE_SIZE;
        const end = start + PAGE_SIZE;
        const pageData = parsedData.slice(start, end);

        bodyEl.innerHTML = pageData.map(row =>
            '<tr>' + OUTPUT_COLS.map(c => {
                if (c === '') return '<td></td>';
                const val = row[c] || '';
                const displayVal = val.length > 50 ? val.substring(0, 50) + '...' : val;
                return '<td title="' + val.replace(/"/g, '&quot;') + '">' + displayVal + '</td>';
            }).join('') + '</tr>'
        ).join('');

        const totalPages = Math.ceil(parsedData.length / PAGE_SIZE) || 1;
        document.getElementById('paginationInfo').textContent =
            '第 ' + currentPage + ' / ' + totalPages + ' 页　（共 ' + parsedData.length + ' 条）';
        document.getElementById('pagePrevBtn').disabled = currentPage <= 1;
        document.getElementById('pageNextBtn').disabled = currentPage >= totalPages;
    }

    function changePage(delta) {
        const totalPages = Math.ceil(parsedData.length / PAGE_SIZE) || 1;
        currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
        renderPreviewPage();
    }

    // ══════════════════════════════════════
    // 导出 Excel（7列）
    // ══════════════════════════════════════
    function startConvert() {
        const loader = document.getElementById('loader');
        loader.classList.add('active');
        document.getElementById('loaderText').textContent = '正在生成 Excel 文件...';
        document.getElementById('previewSection').classList.remove('active');

        setTimeout(() => {
            try {
                const aoa = [];
                aoa.push(['TimeStamp', 'dispute_task_id', 'feed_id', '', '', '', 'evidence_text', 'pruned_desc']);

                parsedData.forEach(row => {
                    aoa.push([
                        row['TimeStamp'] || '',
                        row['dispute_task_id'] || '',
                        row['feed_id'] || '',
                        '',
                        '',
                        '',
                        row['evidence_text'] || '',
                        row['pruned_desc'] || '',
                    ]);
                });

                const ws = XLSX.utils.aoa_to_sheet(aoa);

                ws['!cols'] = [
                    { wch: 18 },
                    { wch: 28 },
                    { wch: 22 },
                    { wch: 10 },
                    { wch: 10 },
                    { wch: 10 },
                    { wch: 60 },
                    { wch: 60 },
                ];

                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = { c: C, r: R };
                        const cell_ref = XLSX.utils.encode_cell(cell_address);
                        if (!ws[cell_ref]) continue;
                        if (!ws[cell_ref].s) ws[cell_ref].s = {};
                        ws[cell_ref].s.font = { sz: 10 };
                        if (R === 0) ws[cell_ref].s.bold = true;
                    }
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                const fileName = '转换结果_过审_' + new Date().toISOString().slice(0, 10) + '.xlsx';
                XLSX.writeFile(wb, fileName);

                loader.classList.remove('active');
                showNotification('✅ 转换完成！已下载 ' + fileName);
                setTimeout(resetAll, 3000);
            } catch(err) {
                loader.classList.remove('active');
                showNotification('转换失败：' + err.message, 'error');
                console.error(err);
            }
        }, 800);
    }

    function resetAll() {
        parsedData = [];
        currentPage = 1;
        document.getElementById('previewSection').classList.remove('active');
        document.getElementById('fileInput').value = '';
    }

    // ══════════════════════════════════════
    // 通知
    // ══════════════════════════════════════
    function showNotification(msg, type) {
        type = type || 'success';
        const el = document.getElementById('notification');
        el.textContent = msg;
        el.className = 'notification ' + type;
        setTimeout(() => el.classList.add('show'), 10);
        setTimeout(() => el.classList.remove('show'), 3500);
    }
</script>
</body>
</html>
