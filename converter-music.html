<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐数据转换工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        html { min-width: 1400px; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1e3a 50%, #2a2e4a 100%);
            color: #fff;
            min-height: 100vh;
            min-width: 1400px;
            overflow-x: auto;
        }
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 10, 30, 0.55);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 10;
            width: 1400px !important;
            min-width: 1400px !important;
            max-width: 1400px !important;
            margin: 0 auto;
            padding: 40px 40px;
        }

        /* 模块分类导航 */
        .module-nav {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 35px;
            animation: fadeInDown .6s ease-out both;
        }
        .module-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 1.15em;
            font-weight: 600;
            cursor: pointer;
            transition: all .35s cubic-bezier(.16,1,.3,1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            user-select: none;
        }
        .module-btn .icon { font-size: 1.2em; line-height: 1; }
        .module-btn.approve {
            background: rgba(255,255,255,.05);
            border-color: rgba(102,126,234,.4);
            color: rgba(255,255,255,.85);
        }
        .module-btn.approve:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(102,126,234,.12);
            border-color: rgba(102,126,234,.7);
            box-shadow: 0 8px 30px rgba(102,126,234,.2);
        }
        .module-btn.reject {
            background: rgba(255,255,255,.05);
            border-color: rgba(239,68,68,.4);
            color: rgba(255,255,255,.85);
        }
        .module-btn.reject:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(239,68,68,.12);
            border-color: rgba(239,68,68,.7);
            box-shadow: 0 8px 30px rgba(239,68,68,.2);
        }
        .module-btn.music {
            background: rgba(255,255,255,.05);
            border-color: rgba(168,85,247,.4);
            color: rgba(255,255,255,.85);
        }
        .module-btn.music:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(168,85,247,.12);
            border-color: rgba(168,85,247,.7);
            box-shadow: 0 8px 30px rgba(168,85,247,.2);
        }
        .module-btn.music.active {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 10px 40px rgba(168,85,247,.4);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 步骤式上传区域 */
        .upload-section {
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(168,85,247,.35);
            border-radius: 20px;
            padding: 36px 30px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            transition: all .3s ease;
            animation: fadeInUp .8s ease-out .2s both;
            cursor: pointer;
        }
        .upload-section.drag-over {
            border-color: rgba(168,85,247,.9) !important;
            border-style: solid !important;
            background: rgba(168,85,247,.12) !important;
            box-shadow: 0 0 80px rgba(168,85,247,.25), inset 0 0 40px rgba(168,85,247,.08);
            transform: scale(1.02) !important;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: .95em;
            font-weight: 600;
            transition: all .3s ease;
            opacity: .4;
        }
        .step-item.active {
            opacity: 1;
            background: rgba(168,85,247,.15);
            border: 1px solid rgba(168,85,247,.5);
            color: #c084fc;
        }
        .step-item.done {
            opacity: 1;
            background: rgba(34,197,94,.12);
            border: 1px solid rgba(34,197,94,.4);
            color: #6ee7b7;
        }
        .step-num {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85em;
            font-weight: 700;
            background: rgba(255,255,255,.1);
        }
        .step-item.active .step-num {
            background: rgba(168,85,247,.4);
            color: #fff;
        }
        .step-item.done .step-num {
            background: rgba(34,197,94,.3);
            color: #6ee7b7;
        }
        .step-arrow {
            color: rgba(255,255,255,.2);
            font-size: 1.2em;
            padding-top: 2px;
        }

        .upload-prompt {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255,255,255,.88);
        }
        .upload-sub { color: rgba(255,255,255,.5); font-size: .9em; margin-bottom: 14px; }
        .drag-hint svg { transition: transform .3s ease; margin: 12px auto; display: block; }
        .upload-section.drag-over .drag-hint svg {
            transform: translateY(-8px) scale(1.1);
            stroke: rgba(168,85,247,.9);
        }
        .file-input-wrapper { display: inline-block; margin-top: 10px; position: relative; }
        .file-input { position: absolute; width: 0; height: 0; opacity: 0; }
        .file-label {
            display: inline-block;
            padding: 13px 38px;
            border: 2px dashed rgba(168,85,247,.45);
            border-radius: 14px;
            background: rgba(168,85,247,.08);
            color: rgba(255,255,255,.85);
            font-size: 1em;
            cursor: pointer;
            transition: all .3s ease;
        }
        .file-label:hover {
            border-color: rgba(168,85,247,.85);
            background: rgba(168,85,247,.16);
            box-shadow: 0 4px 20px rgba(168,85,247,.2);
        }
        .uploaded-info {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 22px;
            background: rgba(34,197,94,.1);
            border: 1px solid rgba(34,197,94,.3);
            border-radius: 12px;
            color: #6ee7b7;
            font-size: .95em;
            font-weight: 500;
            margin-top: 10px;
        }
        .uploaded-info .remove-file {
            background: rgba(239,68,68,.2);
            border: 1px solid rgba(239,68,68,.4);
            color: #fca5a5;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: .82em;
            transition: all .2s ease;
            margin-left: 8px;
        }
        .uploaded-info .remove-file:hover { background: rgba(239,68,68,.35); }

        /* 预览区域 */
        .preview-section {
            display: none;
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168,85,247,.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            animation: fadeInUp .6s ease-out both;
        }
        .preview-section.active { display: block; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card {
            flex: 1;
            background: rgba(168,85,247,.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: .9em; color: rgba(255,255,255,.6); margin-top: 5px; }
        .stat-error { background: rgba(239,68,68,.12) !important; border: 1px solid rgba(239,68,68,.35) !important; }
        .stat-error .stat-number { background: linear-gradient(90deg, #f87171, #ef4444) !important; -webkit-background-clip: text !important; background-clip: text !important; }
        .stat-error .stat-label { color: rgba(248,113,113,.8) !important; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid rgba(168,85,247,.2);
            margin-bottom: 25px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 10pt; }
        th {
            background: rgba(168,85,247,.12);
            padding: 12px 14px;
            text-align: center;
            font-weight: 600;
            color: rgba(255,255,255,.9);
            border-bottom: 1px solid rgba(168,85,247,.3);
            white-space: nowrap;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            color: rgba(255,255,255,.75);
            text-align: center;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover td { background: rgba(255,255,255,.03); }

        /* 按钮 */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            box-shadow: 0 4px 20px rgba(168,85,247,.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(168,85,247,.6); }
        .btn-secondary {
            background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.8);
            border: 1px solid rgba(255,255,255,.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.15); transform: translateY(-2px); }

        /* 分页 */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .pagination-info { color: rgba(255,255,255,.6); font-size: .9em; }
        .page-btn {
            padding: 8px 18px;
            border: 1px solid rgba(168,85,247,.4);
            border-radius: 8px;
            background: rgba(168,85,247,.08);
            color: rgba(255,255,255,.85);
            font-size: .9em;
            cursor: pointer;
            transition: all .2s ease;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(168,85,247,.25);
            border-color: rgba(168,85,247,.7);
        }
        .page-btn:disabled { opacity: .35; cursor: not-allowed; }

        /* 加载动画 */
        .loader {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5,10,30,.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loader.active { display: flex; }
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(168,85,247,.3);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 25px;
            font-size: 1.2em;
            color: rgba(255,255,255,.8);
            letter-spacing: 1px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 通知 */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 16px 30px;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            z-index: 10000;
            transform: translateX(120%);
            transition: transform .4s cubic-bezier(.16,1,.3,1);
            backdrop-filter: blur(20px);
        }
        .notification.show { transform: translateX(0); }
        .notification.success {
            background: rgba(16,185,129,.2);
            border: 1px solid rgba(16,185,129,.5);
            color: #6ee7b7;
        }
        .notification.error {
            background: rgba(239,68,68,.2);
            border: 1px solid rgba(239,68,68,.5);
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 模块分类导航 -->
        <div class="module-nav">
            <a href="converter-approve.html" class="module-btn approve">
                <span class="icon">✅</span>
                <span>过审</span>
            </a>
            <a href="converter-reject.html" class="module-btn reject">
                <span class="icon">✖</span>
                <span>不过审</span>
            </a>
            <a href="converter-music.html" class="module-btn music active">
                <span class="icon">🎵</span>
                <span>音乐</span>
            </a>
        </div>

        <!-- 步骤式上传区域 -->
        <div class="upload-section" id="uploadSection">
            <div class="step-indicator">
                <div class="step-item active" id="step1Item">
                    <span class="step-num">1</span>
                    <span>上传文件 1</span>
                </div>
                <span class="step-arrow">→</span>
                <div class="step-item" id="step2Item">
                    <span class="step-num">2</span>
                    <span>上传文件 2</span>
                </div>
                <span class="step-arrow">→</span>
                <div class="step-item" id="step3Item">
                    <span class="step-num">3</span>
                    <span>合并筛选</span>
                </div>
            </div>

            <!-- 步骤1/2 上传区 -->
            <div id="uploadArea">
                <div class="upload-prompt" id="uploadPrompt">📂 拖拽或选择第一个 CSV / Excel 文件</div>
                <p class="upload-sub" id="uploadSub">支持 .csv / .xlsx / .xls 格式</p>
                <div class="drag-hint">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:12px auto;display:block;">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17,8 12,3 7,8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" class="file-input" accept=".csv,.xlsx,.xls">
                    <label for="fileInput" class="file-label" id="fileLabel">📁 选择文件</label>
                </div>
                <div id="uploadedInfo" style="display:none;"></div>
            </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-section" id="previewSection">
            <div class="stats-row" id="stats"></div>
            <div class="table-wrapper">
                <table>
                    <thead id="previewHead"></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
            <div class="pagination-wrapper" id="paginationWrapper" style="display:none;">
                <button class="page-btn" id="pagePrevBtn" onclick="changePage(-1)">◀ 上一页</button>
                <span class="pagination-info" id="paginationInfo"></span>
                <button class="page-btn" id="pageNextBtn" onclick="changePage(1)">下一页 ▶</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="startConvert()">⚡ 开始转换</button>
                <button class="btn btn-secondary" onclick="resetAll()">🔄 重新上传</button>
            </div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">处理中...</div>
    </div>

    <div class="notification" id="notification"></div>

<script>
    const PAGE_SIZE = 20;
    let file1Data = [];   // 文件1解析后的数据
    let file2Data = [];   // 文件2解析后的数据
    let parsedData = [];  // 筛选后的争议数据
    let currentStep = 1;  // 当前上传步骤
    let currentPage = 1;

    // ══════════════════════════════════════
    // 拖拽上传
    // ══════════════════════════════════════
    const uploadSection = document.getElementById('uploadSection');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadSection.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    uploadSection.addEventListener('dragenter', () => uploadSection.classList.add('drag-over'));
    uploadSection.addEventListener('dragover', e => { e.dataTransfer.dropEffect = 'copy'; uploadSection.classList.add('drag-over'); });
    uploadSection.addEventListener('dragleave', e => {
        if (!uploadSection.contains(e.relatedTarget)) uploadSection.classList.remove('drag-over');
    });
    uploadSection.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        uploadSection.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (this.files && this.files[0]) handleFile(this.files[0]);
    });

    // ══════════════════════════════════════
    // 文件处理入口
    // ══════════════════════════════════════
    function handleFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['csv', 'xlsx', 'xls'].includes(ext)) {
            showNotification('请上传 CSV 或 Excel 文件', 'error');
            return;
        }

        const loader = document.getElementById('loader');
        loader.classList.add('active');
        document.getElementById('loaderText').textContent = '正在读取 ' + file.name + '...';

        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                let data;
                if (ext === 'csv') {
                    data = parseCSV(ev.target.result);
                } else {
                    const wb = XLSX.read(ev.target.result, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    data = XLSX.utils.sheet_to_json(ws);
                }

                loader.classList.remove('active');

                if (data.length === 0) {
                    showNotification('⚠️ 未找到有效数据', 'error');
                    return;
                }

                if (currentStep === 1) {
                    file1Data = data;
                    document.getElementById('uploadedInfo').innerHTML =
                        '<span>✅ 文件1：' + file.name + '（' + data.length + ' 条）</span>' +
                        '<button class="remove-file" onclick="removeFile1()">删除</button>';
                    document.getElementById('uploadedInfo').style.display = '';
                    document.getElementById('fileLabel').style.display = 'none';
                    showNotification('✅ 文件1 已加载：' + data.length + ' 条，请继续上传文件2');

                    // 切换到步骤2
                    currentStep = 2;
                    updateStepUI();
                    document.getElementById('uploadPrompt').textContent = '📂 拖拽或选择第二个 CSV / Excel 文件';
                    document.getElementById('fileInput').value = '';
                } else if (currentStep === 2) {
                    file2Data = data;
                    document.getElementById('uploadedInfo').innerHTML +=
                        '<br><span style="margin-top:6px;display:inline-block;">✅ 文件2：' + file.name + '（' + data.length + ' 条）</span>';
                    showNotification('✅ 文件2已加载：' + data.length + ' 条，正在自动筛选...');

                    // 自动进入步骤3：合并筛选
                    currentStep = 3;
                    updateStepUI();
                    setTimeout(() => filterAndMerge(), 300);
                }
            } catch(err) {
                loader.classList.remove('active');
                showNotification('文件解析失败：' + err.message, 'error');
                console.error(err);
            }
        };

        ext === 'csv' ? reader.readAsText(file, 'UTF-8') : reader.readAsArrayBuffer(file);
    }

    function removeFile1() {
        file1Data = [];
        file2Data = [];
        parsedData = [];
        currentStep = 1;
        document.getElementById('uploadedInfo').style.display = 'none';
        document.getElementById('fileLabel').style.display = '';
        document.getElementById('uploadPrompt').textContent = '📂 拖拽或选择第一个 CSV / Excel 文件';
        document.getElementById('fileInput').value = '';
        document.getElementById('previewSection').classList.remove('active');
        updateStepUI();
    }

    function updateStepUI() {
        var s1 = document.getElementById('step1Item');
        var s2 = document.getElementById('step2Item');
        var s3 = document.getElementById('step3Item');
        s1.className = 'step-item' + (currentStep >= 1 ? (file1Data.length > 0 ? ' done' : ' active') : '');
        s2.className = 'step-item' + (currentStep >= 2 ? (file2Data.length > 0 ? ' done' : ' active') : '');
        s3.className = 'step-item' + (currentStep >= 3 ? (parsedData.length > 0 ? ' done' : ' active') : '');
    }

    // ══════════════════════════════════════
    // CSV 解析器（逐字符状态机）
    // ══════════════════════════════════════
    function parseCSV(text) {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;
        let i = 0;

        while (i <= text.length) {
            if (i === text.length) {
                if (currentField || currentRow.length > 0) {
                    currentRow.push(currentField);
                    if (currentRow.some(f => f && f.trim())) rows.push(currentRow);
                }
                break;
            }
            var ch = text[i];
            if (inQuotes) {
                if (ch === '"') {
                    if (i + 1 < text.length && text[i + 1] === '"') {
                        currentField += '"'; i += 2; continue;
                    } else { inQuotes = false; i++; continue; }
                } else { currentField += ch; i++; continue; }
            } else {
                if (ch === '"') { inQuotes = true; i++; continue; }
                else if (ch === ',') { currentRow.push(currentField); currentField = ''; i++; continue; }
                else if (ch === '\n') {
                    currentRow.push(currentField); currentField = '';
                    if (currentRow.some(f => f && f.trim())) rows.push(currentRow);
                    currentRow = []; i++; continue;
                } else { currentField += ch; i++; continue; }
            }
        }

        if (rows.length < 2) return [];

        var headers = rows[0].map(function(h) {
            var s = h || '';
            if (s.startsWith('"') && s.endsWith('"')) s = s.slice(1, -1);
            return s.trim();
        });

        var result = [];
        for (var ri = 1; ri < rows.length; ri++) {
            var vals = rows[ri];
            var obj = {};
            headers.forEach(function(h, j) {
                obj[h] = (vals[j] || '').replace(/\t/g, ' ').trim();
            });
            result.push(obj);
        }
        return result;
    }

    // ══════════════════════════════════════
    // 字段提取（纯字符串搜索）
    // ══════════════════════════════════════
    function extractFromStr(str, key) {
        if (!str) return null;

        function doExtract(s, q) {
            var keyWithQuote = q + key + q;
            var idx = s.indexOf(keyWithQuote);
            if (idx === -1) return null;

            var rest = s.slice(idx + keyWithQuote.length);
            var colonIdx = -1;
            for (var j = 0; j < rest.length; j++) {
                if (rest[j] === ':' || rest[j] === ';') { colonIdx = j; break; }
            }
            if (colonIdx === -1) return null;

            rest = rest.slice(colonIdx + 1);
            var valStart = 0;
            while (valStart < rest.length && (rest[valStart] === ' ' || rest[valStart] === '\t')) valStart++;
            if (valStart >= rest.length) return null;

            if (rest[valStart] === '"') {
                var endIdx = rest.indexOf('"', valStart + 1);
                return endIdx === -1 ? null : rest.slice(valStart + 1, endIdx).trim();
            }
            if (rest[valStart] === '\\' && rest[valStart + 1] === '"') {
                var endIdx = rest.indexOf('\\"', valStart + 2);
                return endIdx === -1 ? null : rest.slice(valStart + 2, endIdx).trim();
            }
            var endIdx = rest.length;
            for (var j = valStart; j < rest.length; j++) {
                if (rest[j] === ';' || rest[j] === ',' || rest[j] === '}' || rest[j] === '\n' || rest[j] === '\r' || rest[j] === ' ') {
                    endIdx = j; break;
                }
            }
            var val = rest.slice(valStart, endIdx).trim();
            return val || null;
        }
        return doExtract(str, '"') || doExtract(str, '\\"');
    }

    /**
     * 提取 feed_id
     * 优先级: content_data.content.feed_id（扁平列）→ 其他含feed_id列 → extractFromStr
     */
    function extractFeedId(row) {
        var allKeys = Object.keys(row);

        // 1. 最高优先级：精确匹配扁平列 content_data.content.feed_id
        var exactFeedCols = ['content_data.content.feed_id', 'content_data.content.feedid',
                             'feed_id', 'FeedId', 'feedID'];
        for (var i = 0; i < exactFeedCols.length; i++) {
            var v = String(row[exactFeedCols[i]] || '').trim();
            if (v && v !== 'nan' && v !== 'NaN' && v !== 'undefined') {
                // 处理科学计数法
                if (v.indexOf('e') !== -1 || v.indexOf('E') !== -1) {
                    var n = parseFloat(v);
                    if (!isNaN(n)) v = n.toFixed(0);
                }
                return v;
            }
        }

        // 2. 其他包含 feed_id 的列（排除 ilabel 等干扰字段）
        var skipPatterns = ['ilabel', 'from_mid'];
        for (var i = 0; i < allKeys.length; i++) {
            var k = allKeys[i];
            var shouldSkip = false;
            for (var s = 0; s < skipPatterns.length; s++) {
                if (k.indexOf(skipPatterns[s]) !== -1) { shouldSkip = true; break; }
            }
            if (shouldSkip) continue;
            if ((k.indexOf('feed_id') !== -1 || k === 'feedId' || k === 'feed.id') && row[k]) {
                var v = String(row[k]).trim();
                if (v && v !== 'nan' && v !== 'NaN') return v;
            }
        }

        // 3. JSON 字符串搜索
        var cd = (row['content_data'] || '').trim();
        if (cd) { var fid = extractFromStr(cd, 'feed_id'); if (fid) return fid; }

        var ad = (row['answer_data'] || '').trim();
        if (ad) { var fid = extractFromStr(ad, 'feed_id'); if (fid) return fid; }

        return '';
    }

    /**
     * 提取 key_result_label（标注结果）
     * 优先级：精确列名 → 列名后缀匹配（跳过 ilabel/from_mid 等干扰字段） → JSON字符串搜索
     */
    function extractLabel(row) {
        var allKeys = Object.keys(row);

        // 1. 精确列名匹配（最高优先级）
        var exactNames = ['content.key_result_label', 'key_result_label', '标注结果'];
        for (var i = 0; i < exactNames.length; i++) {
            var v = String(row[exactNames[i]] || '').trim();
            if (v) return v;
        }

        // 2. 列名后缀匹配：以 key_result_label 或 result_label 结尾的列
        //    排除 ilabel_sys_content、from_mid、parent_hid 等干扰字段
        var skipPatterns = ['ilabel', 'from_mid', 'parent_hid', 'action_name', 'model_listen_id', 'listen_id'];
        for (var i = 0; i < allKeys.length; i++) {
            var k = allKeys[i];
            // 跳过干扰字段
            var shouldSkip = false;
            for (var s = 0; s < skipPatterns.length; s++) {
                if (k.indexOf(skipPatterns[s]) !== -1) { shouldSkip = true; break; }
            }
            if (shouldSkip) continue;

            // 匹配以 key_result_label / result_label 结尾的列名
            if (k === 'key_result_label' || k === 'result_label' ||
                k.endsWith('.key_result_label') || k.endsWith('.result_label') ||
                k.endsWith('_key_result_label') || k.endsWith('_result_label')) {
                var v = String(row[k] || '').trim();
                if (v && v !== 'nan' && v !== 'NaN') return v;
            }
        }

        // 3. content_data / answer_data JSON 字符串搜索
        var cd = (row['content_data'] || '').trim();
        if (cd) {
            var label = extractFromStr(cd, 'key_result_label') || extractFromStr(cd, 'result_label');
            if (label) return label;
        }
        var ad = (row['answer_data'] || '').trim();
        if (ad) {
            var label = extractFromStr(ad, 'key_result_label') || extractFromStr(ad, 'result_label');
            if (label) return label;
        }
        return '';
    }

    /** 提取时间 */
    function extractTime(row) {
        var timeKeys = ['TimeStamp', 'timestamp', '标注时间', 'time', '创建时间'];
        for (var i = 0; i < timeKeys.length; i++) {
            var v = (row[timeKeys[i]] || '').trim();
            if (v) return formatTime(v);
        }
        var allKeys = Object.keys(row);
        for (var i = 0; i < allKeys.length; i++) {
            var k = allKeys[i].toLowerCase();
            if (k.indexOf('time') !== -1 || k.indexOf('日期') !== -1 || k === 'timestamp') {
                var v = (row[allKeys[i]] || '').trim();
                if (v) return formatTime(v);
            }
        }
        return '';
    }

    /** 提取题目ID */
    function extractTaskId(row) {
        var taskKeys = ['dispute_task_id', 'task_id', 'taskid', 'taskId', '题目ID', '任务ID'];
        for (var i = 0; i < taskKeys.length; i++) {
            var v = String(row[taskKeys[i]] || '').trim();
            if (v) return v;
        }
        var allKeys = Object.keys(row);
        for (var i = 0; i < allKeys.length; i++) {
            if (allKeys[i].indexOf('task') !== -1 || allKeys[i] === '题目ID') {
                var v = String(row[allKeys[i]] || '').trim();
                if (v) return v;
            }
        }
        // JSON 字符串搜索
        var cd = (row['content_data'] || '').trim();
        if (cd) {
            var tid = extractFromStr(cd, 'dispute_task_id');
            if (tid) return tid;
        }
        var ad = (row['answer_data'] || '').trim();
        if (ad) {
            var tid = extractFromStr(ad, 'dispute_task_id');
            if (tid) return tid;
        }
        return '';
    }

    /** 提取标注员 */
    function extractAnnotator(row) {
        var opKeys = ['operator', 'Operator', 'opr', 'opr_name', '标注员', '标注人', '处理人'];
        for (var i = 0; i < opKeys.length; i++) {
            var v = (row[opKeys[i]] || '').trim();
            if (v) return v;
        }
        var allKeys = Object.keys(row);
        for (var i = 0; i < allKeys.length; i++) {
            var k = allKeys[i];
            if (k.indexOf('标注员') !== -1 || k.indexOf('operator') !== -1 || k.indexOf('opr') !== -1) {
                var v = (row[k] || '').trim();
                if (v) return v;
            }
        }
        return '';
    }

    // ══════════════════════════════════════
    // 时间格式化
    // ══════════════════════════════════════
    function formatTime(ts) {
        if (!ts) return '';
        ts = String(ts).replace(/	/g, ' ').trim();

        // Excel 序列号
        if (/^\d+(\.\d+)?$/.test(ts) && ts.indexOf('/') === -1 && ts.indexOf('-') === -1) {
            var d = new Date((parseFloat(ts) - 25569) * 86400 * 1000);
            return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
        }

        var m = ts.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        if (m) return m[1] + '/' + parseInt(m[2]) + '/' + parseInt(m[3]);

        return ts;
    }

    // ══════════════════════════════════════
    // 合并两个文件并筛选争议数据
    // 规则：同一 feed_id 但 key_result_label 不同
    // ══════════════════════════════════════
    function filterAndMerge() {
        var loader = document.getElementById('loader');
        loader.classList.add('active');
        document.getElementById('loaderText').textContent = '正在合并并筛选争议数据...';

        setTimeout(function() {
            try {
                var merged = file1Data.concat(file2Data);

                // 按 feed_id 分组
                var feedMap = {};
                for (var i = 0; i < merged.length; i++) {
                    var row = merged[i];
                    var feedId = extractFeedId(row);
                    if (!feedId) continue;
                    if (!feedMap[feedId]) feedMap[feedId] = [];
                    feedMap[feedId].push({
                        raw: row,
                        feedId: feedId,
                        label: extractLabel(row),
                        time: extractTime(row),
                        taskId: extractTaskId(row),
                        annotator: extractAnnotator(row)
                    });
                }

                // 筛选争议：同一 feed_id 下有不同 label 的记录
                parsedData = [];
                var feedIds = Object.keys(feedMap);
                for (var f = 0; f < feedIds.length; f++) {
                    var items = feedMap[feedIds[f]];
                    var labels = {};
                    for (var i = 0; i < items.length; i++) {
                        labels[items[i].label] = true;
                    }
                    var uniqueLabels = Object.keys(labels).filter(function(l){ return l; });

                    // 只有多于一种不同标注结果才算争议
                    if (uniqueLabels.length > 1) {
                        for (var i = 0; i < items.length; i++) {
                            parsedData.push({
                                '标注时间': items[i].time,
                                'feed_id': items[i].feedId,
                                '题目ID': items[i].taskId,
                                '标注员': items[i].annotator,
                                '标注结果': items[i].label
                            });
                        }
                    }
                }

                loader.classList.remove('active');
                updateStepUI();

                if (parsedData.length === 0) {
                    showNotification('⚠️ 未找到争议数据（需要同一 feed_id 下有不同的标注结果）', 'error');
                    return;
                }

                displayPreview();
                document.getElementById('previewSection').classList.add('active');
                showNotification('✅ 筛选完成！共 ' + parsedData.length + ' 条争议记录');
            } catch(err) {
                loader.classList.remove('active');
                showNotification('处理失败：' + err.message, 'error');
                console.error(err);
            }
        }, 400);
    }

    // ══════════════════════════════════════
    // 数据预览（匹配模板：标注时间/feed_id/题目ID/标注员/标注结果）
    // ══════════════════════════════════════
    var OUTPUT_COLS = ['标注时间', 'feed_id', '题目ID', '标注员', '标注结果'];

    function displayPreview() {
        currentPage = 1;

        var statsEl = document.getElementById('stats');
        statsEl.innerHTML =
            '<div class="stat-card"><div class="stat-number">' + (file1Data.length + file2Data.length) + '</div><div class="stat-label">合并总行数</div></div>' +
            '<div class="stat-card"><div class="stat-number">' + parsedData.length + '</div><div class="stat-label">争议记录数</div></div>' +
            '<div class="stat-card stat-error"><div class="stat-number">' + parsedData.filter(function(r){ return !r['feed_id'] || !r['标注结果']; }).length + '</div><div class="stat-label">转化错误</div></div>';

        var headEl = document.getElementById('previewHead');
        headEl.innerHTML = '<tr>' + OUTPUT_COLS.map(function(c) { return '<th>' + c + '</th>'; }).join('') + '</tr>';

        document.getElementById('paginationWrapper').style.display = parsedData.length > PAGE_SIZE ? '' : 'none';
        renderPreviewPage();
    }

    function renderPreviewPage() {
        var bodyEl = document.getElementById('previewBody');
        var start = (currentPage - 1) * PAGE_SIZE;
        var end = start + PAGE_SIZE;
        var pageData = parsedData.slice(start, end);

        bodyEl.innerHTML = pageData.map(function(row) {
            return '<tr>' + OUTPUT_COLS.map(function(c) {
                var val = row[c] || '';
                var displayVal = val.length > 60 ? val.substring(0, 60) + '...' : val;
                return '<td title="' + val.replace(/"/g, '&quot;') + '">' + displayVal + '</td>';
            }).join('') + '</tr>';
        }).join('');

        var totalPages = Math.ceil(parsedData.length / PAGE_SIZE) || 1;
        document.getElementById('paginationInfo').textContent =
            '第 ' + currentPage + ' / ' + totalPages + ' 页　（共 ' + parsedData.length + ' 条）';
        document.getElementById('pagePrevBtn').disabled = currentPage <= 1;
        document.getElementById('pageNextBtn').disabled = currentPage >= totalPages;
    }

    function changePage(delta) {
        var totalPages = Math.ceil(parsedData.length / PAGE_SIZE) || 1;
        currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
        renderPreviewPage();
    }

    // ══════════════════════════════════════
    // 导出 Excel（匹配模板格式）
    // A=标注时间 B=feed_id C=题目ID D=标注员 E=标注结果 F=空
    // ══════════════════════════════════════
    function startConvert() {
        var loader = document.getElementById('loader');
        loader.classList.add('active');
        document.getElementById('loaderText').textContent = '正在生成 Excel 文件...';
        document.getElementById('previewSection').classList.remove('active');

        setTimeout(function() {
            try {
                var aoa = [];
                aoa.push(['标注时间', 'content_data.content.feed_id', '题目ID', '标注员', '标注结果', '']);

                parsedData.forEach(function(row) {
                    aoa.push([
                        row['标注时间'] || '',
                        row['feed_id'] || '',
                        row['题目ID'] || '',
                        row['标注员'] || '',
                        row['标注结果'] || '',
                        ''
                    ]);
                });

                var ws = XLSX.utils.aoa_to_sheet(aoa);

                ws['!cols'] = [
                    { wch: 20 },
                    { wch: 26 },
                    { wch: 26 },
                    { wch: 16 },
                    { wch: 28 },
                    { wch: 8 },
                ];

                var range = XLSX.utils.decode_range(ws['!ref']);
                for (var R = range.s.r; R <= range.e.r; ++R) {
                    for (var C = range.s.c; C <= range.e.c; ++C) {
                        var cell_address = { c: C, r: R };
                        var cell_ref = XLSX.utils.encode_cell(cell_address);
                        if (!ws[cell_ref]) continue;
                        if (!ws[cell_ref].s) ws[cell_ref].s = {};
                        ws[cell_ref].s.font = { sz: 10 };
                        if (R === 0) ws[cell_ref].s.bold = true;
                    }
                }

                var wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                var fileName = '转换结果_音乐_' + new Date().toISOString().slice(0, 10) + '.xlsx';
                XLSX.writeFile(wb, fileName);

                loader.classList.remove('active');
                showNotification('✅ 转换完成！已下载 ' + fileName);
                setTimeout(resetAll, 3000);
            } catch(err) {
                loader.classList.remove('active');
                showNotification('转换失败：' + err.message, 'error');
                console.error(err);
            }
        }, 800);
    }

    function resetAll() {
        file1Data = [];
        file2Data = [];
        parsedData = [];
        currentPage = 1;
        currentStep = 1;
        document.getElementById('previewSection').classList.remove('active');
        document.getElementById('fileInput').value = '';
        document.getElementById('uploadedInfo').style.display = 'none';
        document.getElementById('fileLabel').style.display = '';
        document.getElementById('uploadPrompt').textContent = '📂 拖拽或选择第一个 CSV / Excel 文件';
        updateStepUI();
    }

    // ══════════════════════════════════════
    // 通知
    // ══════════════════════════════════════
    function showNotification(msg, type) {
        type = type || 'success';
        var el = document.getElementById('notification');
        el.textContent = msg;
        el.className = 'notification ' + type;
        setTimeout(function() { el.classList.add('show'); }, 10);
        setTimeout(function() { el.classList.remove('show'); }, 3500);
    }
</script>
